<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OpenCourse</title>
    <script>
      // GitHub Pages SPA fallback.
      // Keep the repo segment (/opencourse) and encode the rest as query params.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      var repoPath = l.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');

      var routePath = l.pathname
        .slice(repoPath.length)
        .replace(/^\//, '')
        .replace(/&/g, '~and~');

      var redirectUrl =
        l.protocol +
        '//' +
        l.hostname +
        (l.port ? ':' + l.port : '') +
        repoPath +
        '/?/' +
        routePath +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;

      l.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
